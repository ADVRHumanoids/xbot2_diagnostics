name: xbot2-diagnostics

services:
  influxdb:
    image: influxdb:2.7
    container_name: xbot2-diagnostics-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-xbot2-diagnostics-dev-password}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-xbot2}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-diagnostics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-xbot2-diagnostics-dev-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  grafana:
    image: grafana/grafana:10.4.12
    container_name: xbot2-diagnostics-grafana
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-xbot2}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-diagnostics}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-xbot2-diagnostics-dev-token}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
