apiVersion: 1

datasources:
  - name: xbot2-diagnostics-influxdb
    type: influxdb
    access: proxy
    uid: xbot2-diagnostics-influxdb
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
      tlsSkipVerify: true
    secureJsonData:
      token: $INFLUXDB_TOKEN
