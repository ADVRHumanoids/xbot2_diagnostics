name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.build_type }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            libzmq3-dev \
            libcppzmq-dev \
            nlohmann-json3-dev \
            libgtest-dev \
            python3-pip

      - name: Configure
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Install Python package & run Python tests
        run: |
          pip install --quiet ".[dev]" pytest
        working-directory: python
        if: matrix.build_type == 'Release'
